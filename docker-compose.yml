version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neighbortask
      POSTGRES_USER: neighbortask
      POSTGRES_PASSWORD: neighbortask123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - neighbortask-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neighbortask"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - neighbortask-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: neighbortask
      DB_PASSWORD: neighbortask123
      DB_NAME: neighbortask
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: neighbortask_jwt_secret_dev
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neighbortask-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    networks:
      - neighbortask-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - neighbortask-net

volumes:
  pgdata:
  redisdata:

networks:
  neighbortask-net:
    driver: bridge
